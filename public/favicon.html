<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Favicon Generator</title>
</head>
<body>
<canvas id="c" width="32" height="32"></canvas>
<script>
var c = document.getElementById('c');
var ctx = c.getContext('2d');
ctx.font = '24px serif';
ctx.fillText('📖', 2, 26);
var url = c.toDataURL();
document.write('<a href="' + url + '" download="favicon.ico">Download</a>');
</script>
</body>
</html>
